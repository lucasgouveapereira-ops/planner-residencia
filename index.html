<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planner Residência — Lucas Gouvea</title>
<meta name="description" content="Planner operacional de estudos para residência médica — Junho a Outubro 2026">
<meta name="theme-color" content="#7C3AED">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Planner Med">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   DESIGN SYSTEM — TOKENS
   ═══════════════════════════════════════════ */
:root {
  --bg-primary: #0a0a12;
  --bg-secondary: #111120;
  --bg-card: #16162a;
  --bg-card-hover: #1c1c38;
  --bg-glass: rgba(22, 22, 42, 0.7);
  --bg-modal: rgba(6, 6, 14, 0.85);
  --border-primary: rgba(255, 255, 255, 0.06);
  --border-secondary: rgba(255, 255, 255, 0.1);
  --border-accent: rgba(124, 58, 237, 0.3);
  --text-primary: #e8e6f0;
  --text-secondary: #9896a8;
  --text-tertiary: #5e5c6e;
  --text-muted: #3d3b4d;
  --accent-purple: #7C3AED;
  --accent-blue: #3B82F6;
  --accent-cyan: #06B6D4;
  --accent-green: #10B981;
  --accent-amber: #F59E0B;
  --accent-rose: #F43F5E;
  --accent-orange: #F97316;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
  --shadow-glow: 0 0 40px rgba(124, 58, 237, 0.15);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-med: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-slow: 0.4s cubic-bezier(0.4, 0, 0.2, 1);

  /* Area colors */
  --area-cb: #7C3AED;
  --area-cm: #3B82F6;
  --area-cir: #F59E0B;
  --area-ped: #F97316;
  --area-go: #F43F5E;
  --area-sc: #10B981;
  --area-rev: #6B7280;
}

/* ═══════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  scroll-behavior: smooth;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(ellipse at 30% 20%, rgba(124, 58, 237, 0.08) 0%, transparent 50%),
              radial-gradient(ellipse at 70% 80%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-secondary); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

/* ═══════════════════════════════════════════
   LAYOUT SHELL
   ═══════════════════════════════════════════ */
.app-shell {
  position: relative;
  z-index: 1;
  max-width: 1400px;
  margin: 0 auto;
  padding: 32px 40px 60px;
}

/* ═══════════════════════════════════════════
   HEADER
   ═══════════════════════════════════════════ */
.app-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 28px;
  gap: 24px;
  flex-wrap: wrap;
}

.header-left h1 {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #e8e6f0 0%, #a5a3b8 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header-left .subtitle {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 4px;
  font-weight: 400;
}

.header-left .subtitle span {
  color: var(--accent-purple);
  font-weight: 500;
}

.header-right {
  display: flex;
  gap: 10px;
  align-items: center;
}

.header-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-secondary);
  background: var(--bg-card);
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition-fast);
  font-family: inherit;
}

.header-btn:hover {
  border-color: var(--accent-purple);
  color: var(--text-primary);
  background: var(--bg-card-hover);
}

.header-btn svg { width: 14px; height: 14px; }

/* ═══════════════════════════════════════════
   STATS BAR
   ═══════════════════════════════════════════ */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border-primary);
  border-radius: var(--radius-md);
  padding: 16px 18px;
  position: relative;
  overflow: hidden;
  transition: all var(--transition-fast);
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--stat-accent, var(--accent-purple));
  opacity: 0.6;
}

.stat-card:hover { border-color: var(--border-secondary); }

.stat-label {
  font-size: 11px;
  color: var(--text-tertiary);
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.stat-value {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -1px;
  color: var(--text-primary);
}

.stat-value .stat-unit {
  font-size: 14px;
  font-weight: 400;
  color: var(--text-tertiary);
  letter-spacing: 0;
}

.stat-sub {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: 2px;
}

.overall-progress-track {
  height: 4px;
  background: rgba(255,255,255,0.05);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 10px;
}

.overall-progress-fill {
  height: 100%;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue), var(--accent-cyan));
  transition: width var(--transition-slow);
}

/* ═══════════════════════════════════════════
   AREA PROGRESS MINI BARS
   ═══════════════════════════════════════════ */
.area-progress-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 8px;
  margin-bottom: 24px;
}

.area-prog-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--bg-card);
  border: 1px solid var(--border-primary);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition-fast);
}

.area-prog-item:hover { border-color: var(--border-secondary); }
.area-prog-item.filter-active { border-color: var(--area-color); box-shadow: 0 0 12px rgba(var(--area-color-rgb), 0.15); }

.area-prog-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.area-prog-label {
  font-size: 11px;
  color: var(--text-secondary);
  font-weight: 500;
  flex: 1;
  white-space: nowrap;
}

.area-prog-pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-tertiary);
  font-weight: 500;
}

.area-prog-bar {
  width: 40px;
  height: 3px;
  background: rgba(255,255,255,0.05);
  border-radius: 2px;
  overflow: hidden;
}

.area-prog-fill { height: 100%; border-radius: 2px; transition: width var(--transition-med); }

/* ═══════════════════════════════════════════
   CONTROLS ROW
   ═══════════════════════════════════════════ */
.controls-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.search-box {
  position: relative;
  flex: 1;
  min-width: 200px;
  max-width: 360px;
}

.search-box svg {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 14px;
  height: 14px;
  color: var(--text-tertiary);
  pointer-events: none;
}

.search-box input {
  width: 100%;
  padding: 9px 12px 9px 34px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-primary);
  background: var(--bg-card);
  color: var(--text-primary);
  font-size: 12px;
  font-family: inherit;
  outline: none;
  transition: all var(--transition-fast);
}

.search-box input::placeholder { color: var(--text-muted); }
.search-box input:focus { border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1); }

.month-nav {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.mnav-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-primary);
  background: var(--bg-card);
  color: var(--text-tertiary);
  cursor: pointer;
  transition: all var(--transition-fast);
  letter-spacing: 0.02em;
  font-weight: 500;
}

.mnav-btn:hover { border-color: var(--border-secondary); color: var(--text-secondary); }

.mnav-btn.active {
  background: linear-gradient(135deg, var(--accent-purple), #6d28d9);
  color: #fff;
  border-color: transparent;
  box-shadow: 0 2px 12px rgba(124, 58, 237, 0.3);
}

.view-toggle {
  display: flex;
  gap: 2px;
  background: var(--bg-card);
  border: 1px solid var(--border-primary);
  border-radius: var(--radius-sm);
  padding: 2px;
}

.view-btn {
  padding: 6px 10px;
  border: none;
  border-radius: 6px;
  background: transparent;
  color: var(--text-tertiary);
  cursor: pointer;
  transition: all var(--transition-fast);
  display: flex;
  align-items: center;
  justify-content: center;
}

.view-btn svg { width: 14px; height: 14px; }
.view-btn:hover { color: var(--text-secondary); }
.view-btn.active { background: var(--bg-card-hover); color: var(--text-primary); }

.filter-status {
  display: flex;
  gap: 4px;
}

.filter-status-btn {
  font-size: 11px;
  padding: 7px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-primary);
  background: var(--bg-card);
  color: var(--text-tertiary);
  cursor: pointer;
  font-family: inherit;
  font-weight: 500;
  transition: all var(--transition-fast);
}

.filter-status-btn:hover { border-color: var(--border-secondary); color: var(--text-secondary); }
.filter-status-btn.active { border-color: var(--accent-purple); color: var(--accent-purple); background: rgba(124,58,237,0.08); }

/* ═══════════════════════════════════════════
   WEEK BLOCKS & DAY CARDS
   ═══════════════════════════════════════════ */
.month-view { display: none; animation: fadeIn 0.3s ease; }
.month-view.active { display: block; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.week-block { margin-bottom: 24px; }

.week-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border-primary);
  display: flex;
  align-items: center;
  gap: 10px;
}

.week-progress-mini {
  height: 2px;
  flex: 1;
  max-width: 120px;
  background: rgba(255,255,255,0.04);
  border-radius: 1px;
  overflow: hidden;
}

.week-progress-mini-fill { height: 100%; border-radius: 1px; background: var(--accent-purple); opacity: 0.5; transition: width var(--transition-med); }

.days-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}

.day-card {
  border-radius: var(--radius-md);
  border: 1px solid var(--border-primary);
  padding: 14px 14px 12px;
  min-height: 120px;
  position: relative;
  background: var(--bg-card);
  transition: all var(--transition-med);
  cursor: pointer;
  overflow: hidden;
}

.day-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 3px;
  height: 100%;
  border-radius: 3px 0 0 3px;
  transition: width var(--transition-fast);
}

.day-card:hover {
  border-color: var(--border-secondary);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}

.day-card:hover::before { width: 4px; }

.day-card.is-today {
  border-color: var(--accent-purple);
  box-shadow: var(--shadow-glow);
}

.day-card.is-today .day-date::after {
  content: 'HOJE';
  font-size: 8px;
  background: var(--accent-purple);
  color: white;
  padding: 1px 5px;
  border-radius: 3px;
  margin-left: 6px;
  font-weight: 600;
  letter-spacing: 0.05em;
  vertical-align: middle;
}

.day-card.is-completed {
  opacity: 0.7;
  background: rgba(16, 185, 129, 0.03);
}

.day-card.is-completed .tema-text {
  text-decoration: line-through;
  text-decoration-color: var(--text-muted);
}

.day-card.is-completed::after {
  content: '✓';
  position: absolute;
  top: 10px;
  right: 10px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--accent-green);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
}

.day-card.has-notes .day-date::before {
  content: '📝';
  font-size: 9px;
  margin-right: 4px;
}

/* Area-specific left border colors */
.card-CB::before { background: var(--area-cb); }
.card-CM::before { background: var(--area-cm); }
.card-CIR::before { background: var(--area-cir); }
.card-PED::before { background: var(--area-ped); }
.card-GO::before { background: var(--area-go); }
.card-SC::before { background: var(--area-sc); }
.card-REV::before { background: var(--area-rev); }

.day-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.day-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-muted);
  font-weight: 500;
}

.card-checkbox {
  width: 16px;
  height: 16px;
  border-radius: 4px;
  border: 1.5px solid var(--border-secondary);
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-fast);
  flex-shrink: 0;
  padding: 0;
  color: transparent;
  font-size: 9px;
}

.card-checkbox:hover { border-color: var(--accent-green); }

.card-checkbox.checked {
  background: var(--accent-green);
  border-color: var(--accent-green);
  color: white;
}

.area-chip {
  display: inline-block;
  font-size: 9px;
  font-family: 'JetBrains Mono', monospace;
  padding: 2px 7px;
  border-radius: 4px;
  font-weight: 600;
  margin-bottom: 6px;
  letter-spacing: 0.04em;
}

.chip-CB { background: rgba(124,58,237,0.15); color: #a78bfa; }
.chip-CM { background: rgba(59,130,246,0.15); color: #93c5fd; }
.chip-CIR { background: rgba(245,158,11,0.15); color: #fcd34d; }
.chip-PED { background: rgba(249,115,22,0.15); color: #fdba74; }
.chip-GO { background: rgba(244,63,94,0.15); color: #fda4af; }
.chip-SC { background: rgba(16,185,129,0.15); color: #6ee7b7; }
.chip-REV { background: rgba(107,114,128,0.15); color: #9ca3af; }

.tema-text {
  font-size: 11.5px;
  line-height: 1.5;
  color: var(--text-primary);
  font-weight: 400;
}

.rev-list {
  margin-top: 8px;
  border-top: 1px dashed var(--border-primary);
  padding-top: 6px;
}

.rev-item {
  font-size: 9.5px;
  color: var(--text-muted);
  line-height: 1.35;
  padding: 1px 0;
  display: flex;
  gap: 4px;
  align-items: flex-start;
}

.rev-arrow {
  flex-shrink: 0;
  color: var(--accent-purple);
  margin-top: 1px;
  font-size: 9px;
}

.card-special .tema-text {
  font-weight: 600;
  background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ═══════════════════════════════════════════
   LIST VIEW
   ═══════════════════════════════════════════ */
.list-view .days-grid {
  grid-template-columns: 1fr;
  gap: 4px;
}

.list-view .day-card {
  min-height: auto;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.list-view .day-card::before {
  position: relative;
  width: 3px;
  height: 28px;
  border-radius: 2px;
  flex-shrink: 0;
}

.list-view .day-card-header { margin-bottom: 0; }
.list-view .area-chip { margin-bottom: 0; }
.list-view .tema-text { flex: 1; }
.list-view .rev-list { display: none; }

/* ═══════════════════════════════════════════
   MODAL — DETAIL / NOTES
   ═══════════════════════════════════════════ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg-modal);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--transition-med);
}

.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.modal-overlay.open .modal-content {
  transform: translateY(0) scale(1);
  opacity: 1;
}

.modal-content {
  background: var(--bg-secondary);
  border: 1px solid var(--border-secondary);
  border-radius: var(--radius-xl);
  width: 90%;
  max-width: 580px;
  max-height: 85vh;
  overflow-y: auto;
  padding: 32px;
  position: relative;
  box-shadow: var(--shadow-lg);
  transform: translateY(20px) scale(0.97);
  opacity: 0;
  transition: all var(--transition-med);
}

.modal-close {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-primary);
  background: var(--bg-card);
  color: var(--text-tertiary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all var(--transition-fast);
}

.modal-close:hover { border-color: var(--accent-rose); color: var(--accent-rose); }

.modal-area-chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 3px 10px;
  border-radius: 5px;
  font-weight: 600;
  letter-spacing: 0.04em;
  display: inline-block;
  margin-bottom: 10px;
}

.modal-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-tertiary);
  margin-bottom: 6px;
}

.modal-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.4;
  margin-bottom: 20px;
}

.modal-section {
  margin-bottom: 20px;
}

.modal-section-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
}

.modal-status-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.status-btn {
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-primary);
  background: var(--bg-card);
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: all var(--transition-fast);
  display: flex;
  align-items: center;
  gap: 6px;
}

.status-btn:hover { border-color: var(--border-secondary); }

.status-btn.active-done {
  background: rgba(16, 185, 129, 0.12);
  border-color: var(--accent-green);
  color: var(--accent-green);
}

.status-btn.active-skip {
  background: rgba(245, 158, 11, 0.12);

const DAY_NAMES = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

// ═══════════════════════════════════════════
// DATE UTILITIES
// ═══════════════════════════════════════════
function getStudyDates(startDate, count) {
  const dates = [];
  let d = new Date(startDate);
  while (dates.length < count) {
    if (d.getDay() !== 0 && d.getDay() !== 6) dates.push(new Date(d));
    d.setDate(d.getDate() + 1);
  }
  return dates;
}

function addWorkdays(date, days) {
  let d = new Date(date);
  let added = 0;
  while (added < days) {
    d.setDate(d.getDate() + 1);
    if (d.getDay() !== 0 && d.getDay() !== 6) added++;
  }
  return d;
}

function dateKey(d) { return d.toDateString(); }
function formatDate(d) { return `${DAY_NAMES[d.getDay()]} ${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`; }
function formatDateFull(d) { return `${DAY_NAMES[d.getDay()]}, ${String(d.getDate()).padStart(2,'0')} de ${MONTH_NAMES[d.getMonth()]} de ${d.getFullYear()}`; }

function isToday(d) {
  const now = new Date();
  return d.getDate() === now.getDate() && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
}

function isPast(d) {
  const now = new Date();
  now.setHours(0,0,0,0);
  const cmp = new Date(d);
  cmp.setHours(0,0,0,0);
  return cmp < now;
}

function getWeekNum(d) {
  const tmp = new Date(d); tmp.setHours(0,0,0,0);
  tmp.setDate(tmp.getDate() + 4 - (tmp.getDay()||7));
  const yearStart = new Date(tmp.getFullYear(),0,1);
  return Math.ceil((((tmp - yearStart) / 86400000) + 1)/7);
}

// ═══════════════════════════════════════════
// INITIALIZATION
// ═══════════════════════════════════════════
const start = new Date(2026, 5, 9); // 9 Jun 2026
const studyDates = getStudyDates(start, PLANO.length);

// Build day map
const dayMap = {};
studyDates.forEach((d, i) => {
  const key = dateKey(d);
  dayMap[key] = { ...PLANO[i], date: d, idx: i };
});

// Calculate spaced revisions
const revisoes = {};
PLANO.forEach((item, i) => {
  if (!item.special) {
    const d = studyDates[i];
    [3, 7, 21].forEach(offset => {
      const rd = addWorkdays(d, offset);
      const key = rd.toDateString();
      if (!revisoes[key]) revisoes[key] = [];
      revisoes[key].push({
        tema: item.tema.substring(0, 50) + (item.tema.length > 50 ? '…' : ''),
        offset,
        fullTema: item.tema
      });
    });
  }
});

// Group by month
const byMonth = {};
studyDates.forEach((d, i) => {
  const mk = d.getFullYear() + '-' + d.getMonth();
  if (!byMonth[mk]) byMonth[mk] = { year: d.getFullYear(), month: d.getMonth(), days: [] };
  byMonth[mk].days.push(d);
});
const months = Object.values(byMonth);

// ═══════════════════════════════════════════
// PERSISTENCE — localStorage
// ═══════════════════════════════════════════
const STORAGE_KEY = 'planner_residencia_lucas_2026';

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (e) { return {}; }
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function getItemData(idx) {
  const data = loadData();
  return data[idx] || { status: 'pending', notes: '', doubts: '' };
}

function setItemData(idx, updates) {
  const data = loadData();
  data[idx] = { ...(data[idx] || { status: 'pending', notes: '', doubts: '' }), ...updates };
  saveData(data);
}

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let currentView = 'grid';
let currentFilter = 'all';
let currentAreaFilter = null;
let currentSearch = '';
let currentMonthIdx = 0;

// Find which month contains today
const todayStr = dateKey(new Date());
months.forEach((m, i) => {
  if (m.days.some(d => dateKey(d) === todayStr)) currentMonthIdx = i;
});

// ═══════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════
function renderStats() {
  const data = loadData();
  const total = PLANO.length;
  let done = 0, pending = 0, skipped = 0;
  const areaCounts = {};

  PLANO.forEach((item, i) => {
    const d = data[i] || {};
    if (d.status === 'done') done++;
    else if (d.status === 'skipped') skipped++;
    else pending++;

    if (!areaCounts[item.area]) areaCounts[item.area] = { total: 0, done: 0 };
    areaCounts[item.area].total++;
    if (d.status === 'done') areaCounts[item.area].done++;
  });

  const pct = total > 0 ? Math.round((done / total) * 100) : 0;

  // Find today's topic
  let todayTema = '—';
  studyDates.forEach((d, i) => {
    if (isToday(d)) todayTema = PLANO[i].tema;
  });

  // Days until next study day
  const now = new Date();
  now.setHours(0,0,0,0);
  let nextDay = null;
  for (const d of studyDates) {
    const cmp = new Date(d); cmp.setHours(0,0,0,0);
    if (cmp >= now) { nextDay = d; break; }
  }

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card" style="--stat-accent: var(--accent-purple)">
      <div class="stat-label">Progresso Geral</div>
      <div class="stat-value">${pct}<span class="stat-unit">%</span></div>
      <div class="stat-sub">${done} de ${total} temas concluídos</div>
      <div class="overall-progress-track">
        <div class="overall-progress-fill" style="width: ${pct}%"></div>
      </div>
    </div>
    <div class="stat-card" style="--stat-accent: var(--accent-green)">
      <div class="stat-label">Concluídos</div>
      <div class="stat-value">${done}<span class="stat-unit"> ✓</span></div>
      <div class="stat-sub">${pending} pendentes · ${skipped} pulados</div>
    </div>
    <div class="stat-card" style="--stat-accent: var(--accent-cyan)">
      <div class="stat-label">Tema de Hoje</div>
      <div class="stat-sub" style="margin-top:4px;color:var(--text-secondary);font-size:12px;line-height:1.4">${todayTema}</div>
    </div>
    <div class="stat-card" style="--stat-accent: var(--accent-amber)">
      <div class="stat-label">Dias Restantes</div>
      <div class="stat-value">${studyDates.length - done}<span class="stat-unit"> dias</span></div>
      <div class="stat-sub">${nextDay ? 'Próximo: ' + formatDate(nextDay) : 'Plano finalizado!'}</div>
    </div>
  `;

  // Area progress
  const areasOrder = ['CB','CM','CIR','PED','GO','SC','REV'];
  document.getElementById('areaProgress').innerHTML = areasOrder.map(a => {
    const c = areaCounts[a] || { total: 0, done: 0 };
    const p = c.total > 0 ? Math.round((c.done / c.total) * 100) : 0;
    const isActive = currentAreaFilter === a;
    return `
      <div class="area-prog-item${isActive ? ' filter-active' : ''}" onclick="toggleAreaFilter('${a}')" style="${isActive ? `--area-color: ${AREA_COLORS[a]}` : ''}">
        <div class="area-prog-dot" style="background:${AREA_COLORS[a]}"></div>
        <span class="area-prog-label">${AREA_NAMES[a]}</span>
        <span class="area-prog-pct">${c.done}/${c.total}</span>
        <div class="area-prog-bar">
          <div class="area-prog-fill" style="width:${p}%;background:${AREA_COLORS[a]}"></div>
        </div>
      </div>`;
  }).join('');
}

function renderCard(d) {
  const key = dateKey(d);
  const item = dayMap[key];
  if (!item) return '';

  const idx = item.idx;
  const itemData = getItemData(idx);
  const area = item.area;
  const revs = revisoes[key] || [];
  const isCompleted = itemData.status === 'done';
  const hasNotes = (itemData.notes && itemData.notes.trim()) || (itemData.doubts && itemData.doubts.trim());
  const today = isToday(d);
  const past = isPast(d) && !today;

  // Filtering
  let hidden = false;
  if (currentFilter === 'done' && itemData.status !== 'done') hidden = true;
  if (currentFilter === 'pending' && itemData.status === 'done') hidden = true;
  if (currentAreaFilter && area !== currentAreaFilter) hidden = true;
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    const match = item.tema.toLowerCase().includes(q) || area.toLowerCase().includes(q) || AREA_NAMES[area].toLowerCase().includes(q);
    if (!match) hidden = true;
  }

  const revHtml = revs.length > 0 ? `<div class="rev-list">${revs.slice(0,2).map(r=>
    `<div class="rev-item"><span class="rev-arrow">↩</span><span>+${r.offset}d · ${r.tema}</span></div>`
  ).join('')}</div>` : '';

  return `
    <div class="day-card card-${area}${item.special ? ' card-special' : ''}${isCompleted ? ' is-completed' : ''}${today ? ' is-today' : ''}${hasNotes ? ' has-notes' : ''}${hidden ? ' hidden-filter' : ''}"
         data-idx="${idx}" onclick="openModal(${idx})">
      <div class="day-card-header">
        <div class="day-date">${formatDate(d)}</div>
        <button class="card-checkbox${isCompleted ? ' checked' : ''}" onclick="event.stopPropagation(); toggleComplete(${idx})" title="${isCompleted ? 'Marcar como pendente' : 'Marcar como concluído'}">
          ${isCompleted ? '✓' : ''}
        </button>
      </div>
      <span class="area-chip chip-${area}">${area}</span>
      <div class="tema-text">${item.tema}</div>
      ${revHtml}
    </div>`;
}

function groupByWeek(days) {
  const weeks = {};
  days.forEach(d => {
    const wk = getWeekNum(d);
    if (!weeks[wk]) weeks[wk] = { start: d, days: [] };
    weeks[wk].days.push(d);
  });
  return Object.values(weeks).sort((a,b) => a.start - b.start);
}

function renderMonth(monthData) {
  const weeks = groupByWeek(monthData.days);
  const data = loadData();

  return weeks.map(week => {
    const weekStart = week.start;
    const weekEnd = week.days[week.days.length-1];
    const label = `Semana de ${String(weekStart.getDate()).padStart(2,'0')}/${String(weekStart.getMonth()+1).padStart(2,'0')} → ${String(weekEnd.getDate()).padStart(2,'0')}/${String(weekEnd.getMonth()+1).padStart(2,'0')}`;

    // Week progress
    let weekDone = 0;
    week.days.forEach(d => {
      const item = dayMap[dateKey(d)];
      if (item && (data[item.idx] || {}).status === 'done') weekDone++;
    });
    const weekPct = week.days.length > 0 ? Math.round((weekDone / week.days.length) * 100) : 0;

    const cards = week.days.map(d => renderCard(d)).join('');
    return `<div class="week-block">
      <div class="week-label">
        ${label}
        <div class="week-progress-mini"><div class="week-progress-mini-fill" style="width:${weekPct}%"></div></div>
        <span style="font-size:9px;color:var(--text-muted)">${weekDone}/${week.days.length}</span>
      </div>
      <div class="days-grid">${cards}</div>
    </div>`;
  }).join('');
}

function renderAll() {
  renderStats();
  renderMonthViews();
  renderDoubtsPanel();
}

function renderMonthViews() {
  const nav = document.getElementById('monthNav');
  const content = document.getElementById('plannerContent');
  nav.innerHTML = '';
  content.innerHTML = '';

  months.forEach((m, i) => {
    const btn = document.createElement('button');
    btn.className = 'mnav-btn' + (i === currentMonthIdx ? ' active' : '');
    btn.textContent = `${MONTH_NAMES[m.month]} ${m.year}`;
    btn.onclick = () => switchMonth(i);
    nav.appendChild(btn);

    const view = document.createElement('div');
    view.className = 'month-view' + (i === currentMonthIdx ? ' active' : '');
    view.id = `month-${i}`;
    view.innerHTML = renderMonth(m);
    content.appendChild(view);
  });

  // Apply view class
  const shell = document.getElementById('appShell');
  shell.classList.toggle('list-view', currentView === 'list');
}

function switchMonth(idx) {
  currentMonthIdx = idx;
  document.querySelectorAll('.mnav-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  document.querySelectorAll('.month-view').forEach((v, i) => v.classList.toggle('active', i === idx));
}

// ═══════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════
function toggleComplete(idx) {
  const d = getItemData(idx);
  const newStatus = d.status === 'done' ? 'pending' : 'done';
  setItemData(idx, { status: newStatus });
  renderAll();
  showToast(newStatus === 'done' ? '✅' : '↩️', newStatus === 'done' ? 'Tema marcado como concluído!' : 'Tema retornado a pendente');
}

function openModal(idx) {
  const item = PLANO[idx];
  const d = studyDates[idx];
  const itemData = getItemData(idx);
  const area = item.area;

  // Revision dates for this item
  let revHtml = '';
  if (!item.special) {
    const revDates = [3, 7, 21].map(offset => {
      const rd = addWorkdays(d, offset);
      return { offset, date: rd, label: `+${offset} dias úteis` };
    });
    revHtml = `
      <div class="modal-section">
        <div class="modal-section-label">Revisões Espaçadas</div>
        <div class="modal-revisions">
          ${revDates.map(r => `
            <div class="modal-rev-item">
              <span class="modal-rev-offset">+${r.offset}d</span>
              <span class="modal-rev-date">${formatDate(r.date)}</span>
              <span class="modal-rev-label">Revisão programada</span>
            </div>
          `).join('')}
        </div>
      </div>`;
  }

  document.getElementById('modalContent').innerHTML = `
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-date">${formatDateFull(d)}</div>
    <span class="modal-area-chip chip-${area}">${area} — ${AREA_NAMES[area]}</span>
    <div class="modal-title">${item.tema}</div>

    <div class="modal-section">
      <div class="modal-section-label">Status</div>
      <div class="modal-status-row">
        <button class="status-btn ${itemData.status === 'done' ? 'active-done' : ''}" onclick="setModalStatus(${idx}, 'done', this)">✓ Concluído</button>
        <button class="status-btn ${itemData.status === 'skipped' ? 'active-skip' : ''}" onclick="setModalStatus(${idx}, 'skipped', this)">⏭ Pulei</button>
        <button class="status-btn ${itemData.status === 'pending' ? 'active-not' : ''}" onclick="setModalStatus(${idx}, 'pending', this)">○ Pendente</button>
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-section-label">📝 Anotações de Estudo</div>
      <textarea class="modal-textarea" id="modalNotes" placeholder="Escreva resumos, pontos importantes, macetes...">${itemData.notes || ''}</textarea>
    </div>

    <div class="modal-section">
      <div class="modal-section-label">❓ Dúvidas</div>
      <textarea class="modal-textarea" id="modalDoubts" placeholder="Registre dúvidas para revisar depois...">${itemData.doubts || ''}</textarea>
    </div>

    ${revHtml}

    <div class="modal-save-row">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveModal(${idx})">💾 Salvar</button>
    </div>
  `;

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function setModalStatus(idx, status, btn) {
  // Remove active classes
  btn.parentElement.querySelectorAll('.status-btn').forEach(b => {
    b.classList.remove('active-done', 'active-skip', 'active-not');
  });
  // Set new
  if (status === 'done') btn.classList.add('active-done');
  else if (status === 'skipped') btn.classList.add('active-skip');
  else btn.classList.add('active-not');

  setItemData(idx, { status });
  renderStats();
  // Update card in background
  const card = document.querySelector(`.day-card[data-idx="${idx}"]`);
  if (card) {
    card.classList.toggle('is-completed', status === 'done');
    const cb = card.querySelector('.card-checkbox');
    if (cb) {
      cb.classList.toggle('checked', status === 'done');
      cb.textContent = status === 'done' ? '✓' : '';
    }
  }
}

function saveModal(idx) {
  const notes = document.getElementById('modalNotes').value;
  const doubts = document.getElementById('modalDoubts').value;
  setItemData(idx, { notes, doubts });
  closeModal();
  renderAll();
  showToast('💾', 'Anotações salvas com sucesso!');
}

// ═══════════════════════════════════════════
// FILTERING & SEARCH
// ═══════════════════════════════════════════
function setStatusFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-status-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMonthViews();
}

function toggleAreaFilter(area) {
  currentAreaFilter = currentAreaFilter === area ? null : area;
  renderAll();
}

function handleSearch() {
  currentSearch = document.getElementById('searchInput').value;
  renderMonthViews();
}

function setView(view) {
  currentView = view;
  document.getElementById('viewGrid').classList.toggle('active', view === 'grid');
  document.getElementById('viewList').classList.toggle('active', view === 'list');
  document.getElementById('appShell').classList.toggle('list-view', view === 'list');
}

// ═══════════════════════════════════════════
// DOUBTS PANEL
// ═══════════════════════════════════════════
function toggleDoubtsPanel() {
  document.getElementById('doubtsPanel').classList.toggle('open');
}

function renderDoubtsPanel() {
  const data = loadData();
  const entries = [];

  PLANO.forEach((item, i) => {
    const d = data[i] || {};
    if ((d.notes && d.notes.trim()) || (d.doubts && d.doubts.trim())) {
      entries.push({
        idx: i,
        area: item.area,
        tema: item.tema,
        date: studyDates[i],
        notes: d.notes || '',
        doubts: d.doubts || ''
      });
    }
  });

  const body = document.getElementById('doubtsPanelBody');
  if (entries.length === 0) {
    body.innerHTML = '<div class="no-doubts">Nenhuma anotação ou dúvida registrada ainda.<br><br>Clique em um card para adicionar!</div>';
    return;
  }

  body.innerHTML = entries.map(e => `
    <div class="doubt-entry" onclick="openModal(${e.idx})" style="cursor:pointer">
      <div class="doubt-entry-header">
        <span class="doubt-entry-area chip-${e.area}">${e.area}</span>
        <span class="doubt-entry-date">${formatDate(e.date)}</span>
      </div>
      <div class="doubt-entry-topic">${e.tema}</div>
      ${e.doubts ? `<div class="doubt-entry-text" style="color:var(--accent-amber)">❓ ${e.doubts}</div>` : ''}
      ${e.notes ? `<div class="doubt-entry-text" style="margin-top:4px">📝 ${e.notes}</div>` : ''}
    </div>
  `).join('');
}

// ═══════════════════════════════════════════
// EXPORT & RESET
// ═══════════════════════════════════════════
function exportData() {
  const data = loadData();
  const exportObj = {
    exportDate: new Date().toISOString(),
    student: 'Lucas Gouvea',
    plan: PLANO.map((item, i) => ({
      idx: i,
      date: studyDates[i].toISOString().split('T')[0],
      area: item.area,
      tema: item.tema,
      status: (data[i] || {}).status || 'pending',
      notes: (data[i] || {}).notes || '',
      doubts: (data[i] || {}).doubts || ''
    }))
  };

  const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `planner_residencia_export_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('📥', 'Dados exportados com sucesso!');
}

function confirmReset() {
  if (confirm('⚠️ Tem certeza que deseja resetar TODOS os dados?\n\nIsso apagará todos os status, anotações e dúvidas.\nEsta ação NÃO pode ser desfeita!')) {
    localStorage.removeItem(STORAGE_KEY);
    renderAll();
    showToast('🔄', 'Dados resetados!');
  }
}

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
let toastTimeout;
function showToast(icon, msg) {
  const t = document.getElementById('toast');
  t.querySelector('.toast-icon').textContent = icon;
  t.querySelector('.toast-msg').textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => t.classList.remove('show'), 2500);
}

// ═══════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeModal();
    document.getElementById('doubtsPanel').classList.remove('open');
  }
});

// ═══════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════
renderAll();

// ═══════════════════════════════════════════
// PWA — SERVICE WORKER
// ═══════════════════════════════════════════
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.warn('SW registration failed:', err));
  });
}
</script>
