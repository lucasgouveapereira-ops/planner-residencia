<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planner Residência — Lucas Gouvea</title>
  <meta name="description" content="Planner operacional de estudos para residência médica — Junho a Outubro 2026">
  <meta name="theme-color" content="#7C3AED">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Planner Med">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="icon" type="image/png" href="assets/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════
   DESIGN SYSTEM — TOKENS
   ═══════════════════════════════════════════ */
    :root {
      --bg-primary: #0a0a12;
      --bg-secondary: #111120;
      --bg-card: #16162a;
      --bg-card-hover: #1c1c38;
      --bg-glass: rgba(22, 22, 42, 0.7);
      --bg-modal: rgba(6, 6, 14, 0.85);
      --border-primary: rgba(255, 255, 255, 0.06);
      --border-secondary: rgba(255, 255, 255, 0.1);
      --border-accent: rgba(124, 58, 237, 0.3);
      --text-primary: #e8e6f0;
      --text-secondary: #9896a8;
      --text-tertiary: #5e5c6e;
      --text-muted: #3d3b4d;
      --accent-purple: #7C3AED;
      --accent-blue: #3B82F6;
      --accent-cyan: #06B6D4;
      --accent-green: #10B981;
      --accent-amber: #F59E0B;
      --accent-rose: #F43F5E;
      --accent-orange: #F97316;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
      --shadow-glow: 0 0 40px rgba(124, 58, 237, 0.15);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-med: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: 0.4s cubic-bezier(0.4, 0, 0.2, 1);

      /* Area colors */
      --area-cb: #7C3AED;
      --area-cm: #3B82F6;
      --area-cir: #F59E0B;
      --area-ped: #F97316;
      --area-go: #F43F5E;
      --area-sc: #10B981;
      --area-rev: #6B7280;
    }

    /* ═══════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 30% 20%, rgba(124, 58, 237, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-secondary);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-tertiary);
    }

    /* ═══════════════════════════════════════════
   LAYOUT SHELL
   ═══════════════════════════════════════════ */
    .app-shell {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 40px 60px;
    }

    /* ═══════════════════════════════════════════
   HEADER
   ═══════════════════════════════════════════ */
    .app-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 28px;
      gap: 24px;
      flex-wrap: wrap;
    }

    .header-left h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #e8e6f0 0%, #a5a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-left .subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
      font-weight: 400;
    }

    .header-left .subtitle span {
      color: var(--accent-purple);
      font-weight: 500;
    }

    .header-right {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .header-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-secondary);
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition-fast);
      font-family: inherit;
    }

    .header-btn:hover {
      border-color: var(--accent-purple);
      color: var(--text-primary);
      background: var(--bg-card-hover);
    }

    .header-btn svg {
      width: 14px;
      height: 14px;
    }

    /* ═══════════════════════════════════════════
   STATS BAR
   ═══════════════════════════════════════════ */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-md);
      padding: 16px 18px;
      position: relative;
      overflow: hidden;
      transition: all var(--transition-fast);
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--stat-accent, var(--accent-purple));
      opacity: 0.6;
    }

    .stat-card:hover {
      border-color: var(--border-secondary);
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-tertiary);
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -1px;
      color: var(--text-primary);
    }

    .stat-value .stat-unit {
      font-size: 14px;
      font-weight: 400;
      color: var(--text-tertiary);
      letter-spacing: 0;
    }

    .stat-sub {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 2px;
    }

    .overall-progress-track {
      height: 4px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 10px;
    }

    .overall-progress-fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue), var(--accent-cyan));
      transition: width var(--transition-slow);
    }

    /* ═══════════════════════════════════════════
   AREA PROGRESS MINI BARS
   ═══════════════════════════════════════════ */
    .area-progress-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 8px;
      margin-bottom: 24px;
    }

    /* ═══════════════════════════════════════════
   TARGET EXAMS DASHBOARD
   ═══════════════════════════════════════════ */
    .exams-section {
      margin-bottom: 28px;
    }

    .exams-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .exams-section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .exams-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
    }

    .exam-card {
      background: var(--bg-card);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-md);
      padding: 16px 18px;
      position: relative;
      overflow: hidden;
      transition: all var(--transition-med);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .exam-card:hover {
      border-color: var(--border-secondary);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .exam-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      background: var(--exam-accent, var(--accent-purple));
    }

    .exam-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .exam-name {
      font-size: 13.5px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.35;
    }

    .exam-countdown {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
      white-space: nowrap;
      text-transform: uppercase;
    }

    .countdown-urgent {
      background: rgba(244, 63, 94, 0.15);
      color: #fda4af;
      border: 1px solid rgba(244, 63, 94, 0.2);
    }

    .countdown-info {
      background: rgba(59, 130, 246, 0.12);
      color: #93c5fd;
      border: 1px solid rgba(59, 130, 246, 0.2);
    }

    .exam-specialty {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--exam-accent, var(--accent-purple));
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: -2px;
    }

    .exam-details-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin: 4px 0 8px 0;
      font-size: 11px;
      line-height: 1.45;
      color: var(--text-secondary);
    }

    .exam-detail-item {
      display: flex;
      align-items: flex-start;
      gap: 4px;
    }

    .exam-detail-label {
      color: var(--text-tertiary);
      font-weight: 500;
      flex-shrink: 0;
    }

    .exam-focus-bar {
      margin-top: auto;
      padding-top: 8px;
      border-top: 1px dashed var(--border-primary);
    }

    .exam-focus-label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      color: var(--text-tertiary);
      margin-bottom: 4px;
    }

    .exam-focus-track {
      height: 3px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 2px;
      overflow: hidden;
    }

    .exam-focus-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--exam-accent, var(--accent-purple));
      transition: width var(--transition-slow);
    }

    .area-prog-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .area-prog-item:hover {
      border-color: var(--border-secondary);
    }

    .area-prog-item.filter-active {
      border-color: var(--area-color);
      box-shadow: 0 0 12px rgba(var(--area-color-rgb), 0.15);
    }

    .area-prog-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .area-prog-label {
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 500;
      flex: 1;
      white-space: nowrap;
    }

    .area-prog-pct {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-tertiary);
      font-weight: 500;
    }

    .area-prog-bar {
      width: 40px;
      height: 3px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 2px;
      overflow: hidden;
    }

    .area-prog-fill {
      height: 100%;
      border-radius: 2px;
      transition: width var(--transition-med);
    }

    /* ═══════════════════════════════════════════
   CONTROLS ROW
   ═══════════════════════════════════════════ */
    .controls-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .search-box {
      position: relative;
      flex: 1;
      min-width: 200px;
      max-width: 360px;
    }

    .search-box svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      color: var(--text-tertiary);
      pointer-events: none;
    }

    .search-box input {
      width: 100%;
      padding: 9px 12px 9px 34px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-primary);
      background: var(--bg-card);
      color: var(--text-primary);
      font-size: 12px;
      font-family: inherit;
      outline: none;
      transition: all var(--transition-fast);
    }

    .search-box input::placeholder {
      color: var(--text-muted);
    }

    .search-box input:focus {
      border-color: var(--accent-purple);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
    }

    .month-nav {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .mnav-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 7px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-primary);
      background: var(--bg-card);
      color: var(--text-tertiary);
      cursor: pointer;
      transition: all var(--transition-fast);
      letter-spacing: 0.02em;
      font-weight: 500;
    }

    .mnav-btn:hover {
      border-color: var(--border-secondary);
      color: var(--text-secondary);
    }

    .mnav-btn.active {
      background: linear-gradient(135deg, var(--accent-purple), #6d28d9);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 2px 12px rgba(124, 58, 237, 0.3);
    }

    .view-toggle {
      display: flex;
      gap: 2px;
      background: var(--bg-card);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-sm);
      padding: 2px;
    }

    .view-btn {
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--text-tertiary);
      cursor: pointer;
      transition: all var(--transition-fast);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .view-btn svg {
      width: 14px;
      height: 14px;
    }

    .view-btn:hover {
      color: var(--text-secondary);
    }

    .view-btn.active {
      background: var(--bg-card-hover);
      color: var(--text-primary);
    }

    .filter-status {
      display: flex;
      gap: 4px;
    }

    .filter-status-btn {
      font-size: 11px;
      padding: 7px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-primary);
      background: var(--bg-card);
      color: var(--text-tertiary);
      cursor: pointer;
      font-family: inherit;
      font-weight: 500;
      transition: all var(--transition-fast);
    }

    .filter-status-btn:hover {
      border-color: var(--border-secondary);
      color: var(--text-secondary);
    }

    .filter-status-btn.active {
      border-color: var(--accent-purple);
      color: var(--accent-purple);
      background: rgba(124, 58, 237, 0.08);
    }

    /* ═══════════════════════════════════════════
   WEEK BLOCKS & DAY CARDS
   ═══════════════════════════════════════════ */
    .month-view {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .month-view.active {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .week-block {
      margin-bottom: 24px;
    }

    .week-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-primary);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .week-progress-mini {
      height: 2px;
      flex: 1;
      max-width: 120px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 1px;
      overflow: hidden;
    }

    .week-progress-mini-fill {
      height: 100%;
      border-radius: 1px;
      background: var(--accent-purple);
      opacity: 0.5;
      transition: width var(--transition-med);
    }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .day-card {
      border-radius: var(--radius-md);
      border: 1px solid var(--border-primary);
      padding: 14px 14px 12px;
      min-height: 120px;
      position: relative;
      background: var(--bg-card);
      transition: all var(--transition-med);
      cursor: pointer;
      overflow: hidden;
    }

    .day-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      border-radius: 3px 0 0 3px;
      transition: width var(--transition-fast);
    }

    .day-card:hover {
      border-color: var(--border-secondary);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .day-card:hover::before {
      width: 4px;
    }

    .day-card.is-today {
      border-color: var(--accent-purple);
      box-shadow: var(--shadow-glow);
    }

    .day-card.is-today .day-date::after {
      content: 'HOJE';
      font-size: 8px;
      background: var(--accent-purple);
      color: white;
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: 6px;
      font-weight: 600;
      letter-spacing: 0.05em;
      vertical-align: middle;
    }

    .day-card.is-completed {
      opacity: 0.7;
      background: rgba(16, 185, 129, 0.03);
    }

    .day-card.is-completed .tema-text {
      text-decoration: line-through;
      text-decoration-color: var(--text-muted);
    }

    .day-card.is-completed::after {
      content: '✓';
      position: absolute;
      top: 10px;
      right: 10px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--accent-green);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
    }

    .day-card.has-notes .day-date::before {
      content: '📝';
      font-size: 9px;
      margin-right: 4px;
    }

    /* Area-specific left border colors */
    .card-CB::before {
      background: var(--area-cb);
    }

    .card-CM::before {
      background: var(--area-cm);
    }

    .card-CIR::before {
      background: var(--area-cir);
    }

    .card-PED::before {
      background: var(--area-ped);
    }

    .card-GO::before {
      background: var(--area-go);
    }

    .card-SC::before {
      background: var(--area-sc);
    }

    .card-REV::before {
      background: var(--area-rev);
    }

    .day-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .day-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .card-checkbox {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      border: 1.5px solid var(--border-secondary);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-fast);
      flex-shrink: 0;
      padding: 0;
      color: transparent;
      font-size: 9px;
    }

    .card-checkbox:hover {
      border-color: var(--accent-green);
    }

    .card-checkbox.checked {
      background: var(--accent-green);
      border-color: var(--accent-green);
      color: white;
    }

    .area-chip {
      display: inline-block;
      font-size: 9px;
      font-family: 'JetBrains Mono', monospace;
      padding: 2px 7px;
      border-radius: 4px;
      font-weight: 600;
      margin-bottom: 6px;
      letter-spacing: 0.04em;
    }

    .chip-CB {
      background: rgba(124, 58, 237, 0.15);
      color: #a78bfa;
    }

    .chip-CM {
      background: rgba(59, 130, 246, 0.15);
      color: #93c5fd;
    }

    .chip-CIR {
      background: rgba(245, 158, 11, 0.15);
      color: #fcd34d;
    }

    .chip-PED {
      background: rgba(249, 115, 22, 0.15);
      color: #fdba74;
    }

    .chip-GO {
      background: rgba(244, 63, 94, 0.15);
      color: #fda4af;
    }

    .chip-SC {
      background: rgba(16, 185, 129, 0.15);
      color: #6ee7b7;
    }

    .chip-REV {
      background: rgba(107, 114, 128, 0.15);
      color: #9ca3af;
    }

    .tema-text {
      font-size: 11.5px;
      line-height: 1.5;
      color: var(--text-primary);
      font-weight: 400;
    }

    .rev-list {
      margin-top: 8px;
      border-top: 1px dashed var(--border-primary);
      padding-top: 6px;
    }

    .rev-item {
      font-size: 9.5px;
      color: var(--text-muted);
      line-height: 1.35;
      padding: 1px 0;
      display: flex;
      gap: 4px;
      align-items: flex-start;
    }

    .rev-arrow {
      flex-shrink: 0;
      color: var(--accent-purple);
      margin-top: 1px;
      font-size: 9px;
    }

    .card-special .tema-text {
      font-weight: 600;
      background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ═══════════════════════════════════════════
   LIST VIEW
   ═══════════════════════════════════════════ */
    .list-view .days-grid {
      grid-template-columns: 1fr;
      gap: 4px;
    }

    .list-view .day-card {
      min-height: auto;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .list-view .day-card::before {
      position: relative;
      width: 3px;
      height: 28px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .list-view .day-card-header {
      margin-bottom: 0;
    }

    .list-view .area-chip {
      margin-bottom: 0;
    }

    .list-view .tema-text {
      flex: 1;
    }

    .list-view .rev-list {
      display: none;
    }

    /* ═══════════════════════════════════════════
   MODAL — DETAIL / NOTES
   ═══════════════════════════════════════════ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg-modal);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition-med);
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal-overlay.open .modal-content {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    .modal-content {
      background: var(--bg-secondary);
      border: 1px solid var(--border-secondary);
      border-radius: var(--radius-xl);
      width: 90%;
      max-width: 580px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 32px;
      position: relative;
      box-shadow: var(--shadow-lg);
      transform: translateY(20px) scale(0.97);
      opacity: 0;
      transition: all var(--transition-med);
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-primary);
      background: var(--bg-card);
      color: var(--text-tertiary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all var(--transition-fast);
    }

    .modal-close:hover {
      border-color: var(--accent-rose);
      color: var(--accent-rose);
    }

    .modal-area-chip {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      padding: 3px 10px;
      border-radius: 5px;
      font-weight: 600;
      letter-spacing: 0.04em;
      display: inline-block;
      margin-bottom: 10px;
    }

    .modal-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-tertiary);
      margin-bottom: 6px;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
      margin-bottom: 20px;
    }

    .modal-section {
      margin-bottom: 20px;
    }

    .modal-section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .modal-status-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .status-btn {
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-primary);
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all var(--transition-fast);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-btn:hover {
      border-color: var(--border-secondary);
    }

    .status-btn.active-done {
      background: rgba(16, 185, 129, 0.12);
      border-color: var(--accent-green);
      color: var(--accent-green);
    }

    .status-btn.active-skip {
      background: rgba(245, 158, 11, 0.12);
      border-color: var(--accent-amber);
      color: var(--accent-amber);
    }

    .status-btn.active-not {
      background: rgba(244, 63, 94, 0.12);
      border-color: var(--accent-rose);
      color: var(--accent-rose);
    }

    .modal-textarea {
      width: 100%;
      min-height: 120px;
      padding: 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-primary);
      background: var(--bg-card);
      color: var(--text-primary);
      font-size: 13px;
      font-family: inherit;
      line-height: 1.6;
      outline: none;
      resize: vertical;
      transition: all var(--transition-fast);
    }

    .modal-textarea::placeholder {
      color: var(--text-muted);
    }

    .modal-textarea:focus {
      border-color: var(--accent-purple);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
    }

    .modal-revisions {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .modal-rev-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      background: var(--bg-card);
      border: 1px solid var(--border-primary);
      font-size: 12px;
    }

    .modal-rev-offset {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--accent-purple);
      font-weight: 600;
      min-width: 30px;
    }

    .modal-rev-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-tertiary);
      min-width: 60px;
    }

    .modal-rev-label {
      color: var(--text-secondary);
      font-size: 11px;
      flex: 1;
    }

    .modal-save-row {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border-primary);
    }

    .btn-save {
      padding: 10px 24px;
      border-radius: var(--radius-sm);
      border: none;
      background: linear-gradient(135deg, var(--accent-purple), #6d28d9);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all var(--transition-fast);
      box-shadow: 0 2px 12px rgba(124, 58, 237, 0.3);
    }

    .btn-save:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4);
    }

    .btn-cancel {
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-primary);
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .btn-cancel:hover {
      border-color: var(--border-secondary);
      color: var(--text-primary);
    }

    /* ═══════════════════════════════════════════
   MODAL — FONTES RECOMENDADAS
   ═══════════════════════════════════════════ */
    .modal-fontes-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .modal-fonte-card {
      background: var(--bg-card);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      position: relative;
      transition: all var(--transition-fast);
      overflow: hidden;
    }

    .modal-fonte-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      border-radius: 3px 0 0 3px;
    }

    .modal-fonte-card:hover {
      border-color: var(--border-secondary);
      background: var(--bg-card-hover);
    }

    .modal-fonte-card.fonte-prova::before { background: var(--accent-purple); }
    .modal-fonte-card.fonte-ref {
      background: #88E788;
      color: #0a0a12;
      border-color: rgba(0, 0, 0, 0.08);
    }
    .modal-fonte-card.fonte-ref:hover {
      background: #9cf59c;
      border-color: rgba(0, 0, 0, 0.15);
    }
    .modal-fonte-card.fonte-ref::before { background: #166534; }
    .modal-fonte-card.fonte-ref .fonte-card-name { color: #0a0a12; }
    .modal-fonte-card.fonte-ref .fonte-card-desc { color: #2e2e3a; }
    .modal-fonte-card.fonte-ref .fonte-tema-pill { background: rgba(0, 0, 0, 0.06); color: #0a0a12; }
    .modal-fonte-card.fonte-ref .fonte-tema-pill.matched { background: rgba(124, 58, 237, 0.15); color: #4c1d95; }
    .modal-fonte-card.fonte-ref .fonte-card-link { color: #1e3a8a; }
    .modal-fonte-card.fonte-dir::before { background: var(--accent-green); }

    .fonte-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }

    .fonte-card-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .fonte-card-badges {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .fonte-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 2px 7px;
      border-radius: 4px;
      white-space: nowrap;
    }

    .fonte-badge-prova { background: rgba(124, 58, 237, 0.15); color: #a78bfa; }
    .fonte-badge-ref { background: rgba(59, 130, 246, 0.15); color: #93c5fd; }
    .fonte-badge-dir { background: rgba(16, 185, 129, 0.15); color: #6ee7b7; }
    .fonte-badge-gratis { background: rgba(245, 158, 11, 0.15); color: #fcd34d; }
    .fonte-badge-video { background: rgba(244, 63, 94, 0.15); color: #fda4af; }

    .fonte-card-desc {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.55;
      margin-bottom: 6px;
    }

    .fonte-card-temas {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 6px;
    }

    .fonte-tema-pill {
      font-size: 9px;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
    }

    .fonte-tema-pill.matched {
      background: rgba(124, 58, 237, 0.12);
      color: #a78bfa;
      font-weight: 500;
    }

    .fonte-card-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent-cyan);
      text-decoration: none;
      padding: 3px 0;
      transition: opacity var(--transition-fast);
    }

    .fonte-card-link:hover {
      opacity: 0.7;
    }

    .fonte-priority-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border-primary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .fonte-priority-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .fontes-section-note {
      font-size: 11px;
      color: var(--text-muted);
      font-style: italic;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.02);
      border-radius: var(--radius-sm);
      border-left: 2px solid var(--border-primary);
      line-height: 1.5;
    }

    .day-card .fonte-indicator {
      position: absolute;
      bottom: 8px;
      right: 8px;
      font-size: 10px;
      opacity: 0.4;
      transition: opacity var(--transition-fast);
    }

    .day-card:hover .fonte-indicator {
      opacity: 0.7;
    }

    /* ═══════════════════════════════════════════
   TOAST NOTIFICATION
   ═══════════════════════════════════════════ */
    .toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: var(--bg-card);
      border: 1px solid var(--border-secondary);
      border-radius: var(--radius-md);
      padding: 12px 20px;
      font-size: 13px;
      color: var(--text-primary);
      box-shadow: var(--shadow-lg);
      z-index: 2000;
      transform: translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: all var(--transition-med);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
      pointer-events: all;
    }

    .toast-icon {
      font-size: 16px;
    }

    /* ═══════════════════════════════════════════
   HIDDEN CARDS (FILTERED)
   ═══════════════════════════════════════════ */
    .day-card.hidden-filter {
      display: none;
    }

    /* ═══════════════════════════════════════════
   DOUBTS PANEL
   ═══════════════════════════════════════════ */
    .doubts-panel {
      position: fixed;
      top: 0;
      right: -500px;
      width: 460px;
      height: 100vh;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border-secondary);
      z-index: 900;
      transition: right var(--transition-slow);
      display: flex;
      flex-direction: column;
      box-shadow: -8px 0 32px rgba(0, 0, 0, 0.4);
    }

    .doubts-panel.open {
      right: 0;
    }

    .doubts-panel-header {
      padding: 24px;
      border-bottom: 1px solid var(--border-primary);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .doubts-panel-header h2 {
      font-size: 16px;
      font-weight: 600;
    }

    .doubts-panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px;
    }

    .doubt-entry {
      padding: 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-primary);
      background: var(--bg-card);
      margin-bottom: 10px;
    }

    .doubt-entry-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .doubt-entry-area {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 3px;
      font-weight: 600;
    }

    .doubt-entry-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
    }

    .doubt-entry-topic {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 4px;
      font-weight: 500;
    }

    .doubt-entry-text {
      font-size: 12px;
      color: var(--text-primary);
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .no-doubts {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ═══════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════ */
    @media (max-width: 1100px) {
      .days-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 768px) {
      .app-shell {
        padding: 20px 16px 40px;
      }

      .days-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .app-header {
        flex-direction: column;
      }

      .stats-bar {
        grid-template-columns: repeat(2, 1fr);
      }

      .modal-content {
        padding: 24px 20px;
        width: 95%;
      }

      .doubts-panel {
        width: 100%;
        right: -100%;
      }
    }

    @media (max-width: 480px) {
      .days-grid {
        grid-template-columns: 1fr;
      }

      .stats-bar {
        grid-template-columns: 1fr;
      }
    }
  
    /* FIREBASE LOGIN OVERLAY */
    #loginOverlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg-modal);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.3s ease;
    }
    .login-box {
      background: var(--bg-glass);
      border: 1px solid var(--border-secondary);
      border-radius: var(--radius-xl);
      padding: 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: var(--shadow-lg), var(--shadow-glow);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: relative;
      animation: modalEntry 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes modalEntry {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .login-box h2 {
      margin-bottom: 8px;
      color: var(--text-primary);
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 0%, var(--text-secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .login-box p {
      color: var(--text-secondary);
      margin-bottom: 24px;
      font-size: 14px;
      line-height: 1.5;
    }
    .login-box input {
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 16px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: all var(--transition-fast);
    }
    .login-box input:focus {
      border-color: var(--accent-purple);
      background: rgba(0, 0, 0, 0.4);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
    }
    .login-box button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--accent-purple), #6d28d9);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 12px;
      transition: all var(--transition-fast);
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.2);
    }
    .login-box button:hover {
      transform: translateY(-1px);
      background: #6d28d9;
      box-shadow: 0 6px 16px rgba(124, 58, 237, 0.35);
    }
    .login-box button:active {
      transform: translateY(0);
    }
    .auth-error {
      color: #fda4af;
      background: rgba(244, 63, 94, 0.1);
      border: 1px solid rgba(244, 63, 94, 0.2);
      font-size: 13px;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      margin-bottom: 20px;
      display: none;
      text-align: left;
      line-height: 1.45;
    }
    .auth-error code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #f43f5e;
      display: block;
      margin-top: 6px;
      background: rgba(0, 0, 0, 0.25);
      padding: 6px 8px;
      border-radius: 4px;
      word-break: break-all;
    }
    .login-box .btn-secondary {
      background: transparent;
      border: 1px solid var(--border-secondary);
      color: var(--text-secondary);
      box-shadow: none;
    }
    .login-box .btn-secondary:hover {
      border-color: var(--text-secondary);
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.02);
      box-shadow: none;
    }
    .login-box .btn-offline {
      background: transparent;
      border: 1px dashed var(--accent-cyan);
      color: var(--accent-cyan);
      box-shadow: none;
      margin-top: 8px;
      margin-bottom: 0;
    }
    .login-box .btn-offline:hover {
      background: rgba(6, 182, 212, 0.08);
      border-color: var(--accent-cyan);
      color: #fff;
      box-shadow: 0 4px 12px rgba(6, 182, 212, 0.1);
    }

    /* SYNC INDICATOR & CONFIG MODAL */
    .sync-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-fast);
      border: 1px solid transparent;
      margin-right: 4px;
    }

    function getSourcesForTopic(area, tema) {
      const areaData = FONTES_MAP[area];
      if (!areaData) return [];

      const temaLower = tema.toLowerCase();
      const matchedTemaKeys = new Set();

      // Find which source themes match this topic
      for (const [keyword, temaNames] of Object.entries(TOPIC_KEYWORDS)) {
        if (temaLower.includes(keyword.toLowerCase())) {
          temaNames.forEach(t => matchedTemaKeys.add(t));
        }
      }

      // Collect matching source cards
      const results = [];
      const seen = new Set();

      for (const secao of areaData.secoes) {
        for (const card of secao.cards) {
          // Check if any of the card's temas match
          const cardMatchedTemas = card.temas.filter(t => matchedTemaKeys.has(t));
          if (cardMatchedTemas.length > 0 && !seen.has(card.name)) {
            seen.add(card.name);
            results.push({ ...card, matchedTemas: cardMatchedTemas, secaoLabel: secao.label });
          }
        }
      }

      // Sort: prova first, then dir, then ref
      const typeOrder = { prova: 0, dir: 1, ref: 2 };
      results.sort((a, b) => (typeOrder[a.type] || 9) - (typeOrder[b.type] || 9));

      return results;
    }

    };

    const MONTH_NAMES = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
    const DAY_NAMES = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];

    // ═══════════════════════════════════════════
    // DATE UTILITIES
    // ═══════════════════════════════════════════
    function getStudyDates(startDate, count) {
      const dates = [];
      let d = new Date(startDate);
      while (dates.length < count) {
        if (d.getDay() !== 0 && d.getDay() !== 6) dates.push(new Date(d));
        d.setDate(d.getDate() + 1);
      }
      return dates;
    }

    function addWorkdays(date, days) {
      let d = new Date(date);
      let added = 0;
      while (added < days) {
        d.setDate(d.getDate() + 1);
        if (d.getDay() !== 0 && d.getDay() !== 6) added++;
      }
      return d;
    }

    function dateKey(d) { return d.toDateString(); }
    function formatDate(d) { return `${DAY_NAMES[d.getDay()]} ${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}`; }
    function formatDateFull(d) { return `${DAY_NAMES[d.getDay()]}, ${String(d.getDate()).padStart(2, '0')} de ${MONTH_NAMES[d.getMonth()]} de ${d.getFullYear()}`; }

    function isToday(d) {
      const now = new Date();
      return d.getDate() === now.getDate() && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    }

    function isPast(d) {
      const now = new Date();
      now.setHours(0, 0, 0, 0);
      const cmp = new Date(d);
      cmp.setHours(0, 0, 0, 0);
      return cmp < now;
    }

    function getWeekNum(d) {
      const tmp = new Date(d); tmp.setHours(0, 0, 0, 0);
      tmp.setDate(tmp.getDate() + 4 - (tmp.getDay() || 7));
      const yearStart = new Date(tmp.getFullYear(), 0, 1);
      return Math.ceil((((tmp - yearStart) / 86400000) + 1) / 7);
    }

    // ═══════════════════════════════════════════
    // INITIALIZATION
    // ═══════════════════════════════════════════
    const start = new Date(2026, 5, 15); // 15 Jun 2026
    const studyDates = getStudyDates(start, PLANO.length);

    // Build day map
    const dayMap = {};
    studyDates.forEach((d, i) => {
      const key = dateKey(d);
      dayMap[key] = { ...PLANO[i], date: d, idx: i };
    });

    // Calculate spaced revisions
    const revisoes = {};
    PLANO.forEach((item, i) => {
      if (!item.special) {
        const d = studyDates[i];
        [3, 7, 21].forEach(offset => {
          const rd = addWorkdays(d, offset);
          const key = rd.toDateString();
          if (!revisoes[key]) revisoes[key] = [];
          revisoes[key].push({
            tema: item.tema.substring(0, 50) + (item.tema.length > 50 ? '…' : ''),
            offset,
            fullTema: item.tema
          });
        });
      }
    });

    // Group by month
    const byMonth = {};
    studyDates.forEach((d, i) => {
      const mk = d.getFullYear() + '-' + d.getMonth();
      if (!byMonth[mk]) byMonth[mk] = { year: d.getFullYear(), month: d.getMonth(), days: [] };
      byMonth[mk].days.push(d);
    });
    const months = Object.values(byMonth);

    // ═══════════════════════════════════════════
    // PERSISTENCE — FIREBASE
    // ═══════════════════════════════════════════
    const STORAGE_KEY = 'planner_residencia_lucas_2026';
    let globalData = {}; // in-memory cache updated by firestore listener
    let currentUserUid = null;

    function loadData() {
      // Local check if offline/unloaded, but usually globalData has the state
      return globalData;
    }

    function saveData(data) {
      globalData = data;
      // Also save to localStorage as a fallback
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      
      // Async save to firestore
      if (currentUserUid && window.db) {
        db.collection('users').doc(currentUserUid).set({
          plannerData: JSON.stringify(data),
          lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true }).catch(err => console.error("Error saving to Firebase", err));
      }
    }

    function getItemData(idx) {
      return globalData[idx] || { status: 'pending', notes: '', doubts: '' };
    }

    function setItemData(idx, updates) {
      globalData[idx] = { ...(globalData[idx] || { status: 'pending', notes: '', doubts: '' }), ...updates };
      saveData(globalData);
    }

    // ═══════════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════════
    let currentView = 'grid';
    let currentFilter = 'all';
    let currentAreaFilter = null;
    let currentSearch = '';
    let currentMonthIdx = 0;

    // Find which month contains today
    const todayStr = dateKey(new Date());
    months.forEach((m, i) => {
      if (m.days.some(d => dateKey(d) === todayStr)) currentMonthIdx = i;
    });

    // ═══════════════════════════════════════════
    // RENDERING
    // ═══════════════════════════════════════════
    function renderStats() {
      const data = loadData();
      const total = PLANO.length;
      let done = 0, pending = 0, skipped = 0;
      const areaCounts = {};

      PLANO.forEach((item, i) => {
        const d = data[i] || {};
        if (d.status === 'done') done++;
        else if (d.status === 'skipped') skipped++;
        else pending++;

        if (!areaCounts[item.area]) areaCounts[item.area] = { total: 0, done: 0 };
        areaCounts[item.area].total++;
        if (d.status === 'done') areaCounts[item.area].done++;
      });

      const pct = total > 0 ? Math.round((done / total) * 100) : 0;

      // Find today's topic
      let todayTema = '—';
      studyDates.forEach((d, i) => {
        if (isToday(d)) todayTema = PLANO[i].tema;
      });

      // Days until next study day
      const now = new Date();
      now.setHours(0, 0, 0, 0);
      let nextDay = null;
      for (const d of studyDates) {
        const cmp = new Date(d); cmp.setHours(0, 0, 0, 0);
        if (cmp >= now) { nextDay = d; break; }
      }

      document.getElementById('statsBar').innerHTML = `
    <div class="stat-card" style="--stat-accent: var(--accent-purple)">
      <div class="stat-label">Progresso Geral</div>
      <div class="stat-value">${pct}<span class="stat-unit">%</span></div>
      <div class="stat-sub">${done} de ${total} temas concluídos</div>
      <div class="overall-progress-track">
        <div class="overall-progress-fill" style="width: ${pct}%"></div>
      </div>
    </div>
    <div class="stat-card" style="--stat-accent: var(--accent-green)">
      <div class="stat-label">Concluídos</div>
      <div class="stat-value">${done}<span class="stat-unit"> ✓</span></div>
      <div class="stat-sub">${pending} pendentes · ${skipped} pulados</div>
    </div>
    <div class="stat-card" style="--stat-accent: var(--accent-cyan)">
      <div class="stat-label">Tema de Hoje</div>
      <div class="stat-sub" style="margin-top:4px;color:var(--text-secondary);font-size:12px;line-height:1.4">${todayTema}</div>
    </div>
    <div class="stat-card" style="--stat-accent: var(--accent-amber)">
      <div class="stat-label">Dias Restantes</div>
      <div class="stat-value">${studyDates.length - done}<span class="stat-unit"> dias</span></div>
      <div class="stat-sub">${nextDay ? 'Próximo: ' + formatDate(nextDay) : 'Plano finalizado!'}</div>
    </div>
  `;

      // Area progress
      const areasOrder = ['CB', 'CM', 'CIR', 'PED', 'GO', 'SC', 'REV'];
      document.getElementById('areaProgress').innerHTML = areasOrder.map(a => {
        const c = areaCounts[a] || { total: 0, done: 0 };
        const p = c.total > 0 ? Math.round((c.done / c.total) * 100) : 0;
        const isActive = currentAreaFilter === a;
        return `
      <div class="area-prog-item${isActive ? ' filter-active' : ''}" onclick="toggleAreaFilter('${a}')" style="${isActive ? `--area-color: ${AREA_COLORS[a]}` : ''}">
        <div class="area-prog-dot" style="background:${AREA_COLORS[a]}"></div>
        <span class="area-prog-label">${AREA_NAMES[a]}</span>
        <span class="area-prog-pct">${c.done}/${c.total}</span>
        <div class="area-prog-bar">
          <div class="area-prog-fill" style="width:${p}%;background:${AREA_COLORS[a]}"></div>
        </div>
      </div>`;
      }).join('');
    }

    function renderCard(d) {
      const key = dateKey(d);
      const item = dayMap[key];
      if (!item) return '';

      const idx = item.idx;
      const itemData = getItemData(idx);
      const area = item.area;
      const revs = revisoes[key] || [];
      const isCompleted = itemData.status === 'done';
      const hasNotes = (itemData.notes && itemData.notes.trim()) || (itemData.doubts && itemData.doubts.trim());
      const today = isToday(d);
      const past = isPast(d) && !today;

      // Filtering
      let hidden = false;
      if (currentFilter === 'done' && itemData.status !== 'done') hidden = true;
      if (currentFilter === 'pending' && itemData.status === 'done') hidden = true;
      if (currentAreaFilter && area !== currentAreaFilter) hidden = true;
      if (currentSearch) {
        const q = currentSearch.toLowerCase();
        const match = item.tema.toLowerCase().includes(q) || area.toLowerCase().includes(q) || AREA_NAMES[area].toLowerCase().includes(q);
        if (!match) hidden = true;
      }

      const revHtml = revs.length > 0 ? `<div class="rev-list">${revs.slice(0, 2).map(r =>
        `<div class="rev-item"><span class="rev-arrow">↩</span><span>+${r.offset}d · ${r.tema}</span></div>`
      ).join('')}</div>` : '';

      // Check if sources are available
      const hasFontes = !item.special && getSourcesForTopic(area, item.tema).length > 0;

      return `
    <div class="day-card card-${area}${item.special ? ' card-special' : ''}${isCompleted ? ' is-completed' : ''}${today ? ' is-today' : ''}${hasNotes ? ' has-notes' : ''}${hidden ? ' hidden-filter' : ''}"
         data-idx="${idx}" onclick="openModal(${idx})">
      <div class="day-card-header">
        <div class="day-date">${formatDate(d)}</div>
        <button class="card-checkbox${isCompleted ? ' checked' : ''}" onclick="event.stopPropagation(); toggleComplete(${idx})" title="${isCompleted ? 'Marcar como pendente' : 'Marcar como concluído'}">
          ${isCompleted ? '✓' : ''}
        </button>
      </div>
      <span class="area-chip chip-${area}">${area}</span>
      <div class="tema-text">${item.tema}</div>
      ${revHtml}
      ${hasFontes ? '<span class="fonte-indicator" title="Fontes de estudo disponíveis">📚</span>' : ''}
    </div>`;
    }

    function groupByWeek(days) {
      const weeks = {};
      days.forEach(d => {
        const wk = getWeekNum(d);
        if (!weeks[wk]) weeks[wk] = { start: d, days: [] };
        weeks[wk].days.push(d);
      });
      return Object.values(weeks).sort((a, b) => a.start - b.start);
    }

    function renderMonth(monthData) {
      const weeks = groupByWeek(monthData.days);
      const data = loadData();

      return weeks.map(week => {
        const weekStart = week.start;
        const weekEnd = week.days[week.days.length - 1];
        const label = `Semana de ${String(weekStart.getDate()).padStart(2, '0')}/${String(weekStart.getMonth() + 1).padStart(2, '0')} → ${String(weekEnd.getDate()).padStart(2, '0')}/${String(weekEnd.getMonth() + 1).padStart(2, '0')}`;

        // Week progress
        let weekDone = 0;
        week.days.forEach(d => {
          const item = dayMap[dateKey(d)];
          if (item && (data[item.idx] || {}).status === 'done') weekDone++;
        });
        const weekPct = week.days.length > 0 ? Math.round((weekDone / week.days.length) * 100) : 0;

        const cards = week.days.map(d => renderCard(d)).join('');
        return `<div class="week-block">
      <div class="week-label">
        ${label}
        <div class="week-progress-mini"><div class="week-progress-mini-fill" style="width:${weekPct}%"></div></div>
        <span style="font-size:9px;color:var(--text-muted)">${weekDone}/${week.days.length}</span>
      </div>
      <div class="days-grid">${cards}</div>
    </div>`;
      }).join('');
    }

    function renderAll() {
      renderStats();
      renderTargetExams();
      renderMonthViews();
      renderDoubtsPanel();
    }

    function renderMonthViews() {
      const nav = document.getElementById('monthNav');
      const content = document.getElementById('plannerContent');
      nav.innerHTML = '';
      content.innerHTML = '';

      months.forEach((m, i) => {
        const btn = document.createElement('button');
        btn.className = 'mnav-btn' + (i === currentMonthIdx ? ' active' : '');
        btn.textContent = `${MONTH_NAMES[m.month]} ${m.year}`;
        btn.onclick = () => switchMonth(i);
        nav.appendChild(btn);

        const view = document.createElement('div');
        view.className = 'month-view' + (i === currentMonthIdx ? ' active' : '');
        view.id = `month-${i}`;
        view.innerHTML = renderMonth(m);
        content.appendChild(view);
      });

      // Apply view class
      const shell = document.getElementById('appShell');
      shell.classList.toggle('list-view', currentView === 'list');
    }

    function switchMonth(idx) {
      currentMonthIdx = idx;
      document.querySelectorAll('.mnav-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
      document.querySelectorAll('.month-view').forEach((v, i) => v.classList.toggle('active', i === idx));
    }

    // ═══════════════════════════════════════════
    // INTERACTIONS
    // ═══════════════════════════════════════════
    function toggleComplete(idx) {
      const d = getItemData(idx);
      const newStatus = d.status === 'done' ? 'pending' : 'done';
      setItemData(idx, { status: newStatus });
      renderAll();
      showToast(newStatus === 'done' ? '✅' : '↩️', newStatus === 'done' ? 'Tema marcado como concluído!' : 'Tema retornado a pendente');
    }

    function openModal(idx) {
      const item = PLANO[idx];
      const d = studyDates[idx];
      const itemData = getItemData(idx);
      const area = item.area;

      // Revision dates for this item
      let revHtml = '';
      if (!item.special) {
        const revDates = [3, 7, 21].map(offset => {
          const rd = addWorkdays(d, offset);
          return { offset, date: rd, label: `+${offset} dias úteis` };
        });
        revHtml = `
      <div class="modal-section">
        <div class="modal-section-label">Revisões Espaçadas</div>
        <div class="modal-revisions">
          ${revDates.map(r => `
            <div class="modal-rev-item">
              <span class="modal-rev-offset">+${r.offset}d</span>
              <span class="modal-rev-date">${formatDate(r.date)}</span>
              <span class="modal-rev-label">Revisão programada</span>
            </div>
          `).join('')}
        </div>
      </div>`;
      }

      // Build recommended sources section
      let fontesHtml = '';
      if (!item.special) {
        const sources = getSourcesForTopic(area, item.tema);
        if (sources.length > 0) {
          const BADGE_LABELS = { prova: 'PROVA', ref: 'REFERÊNCIA', dir: 'DIRETRIZ', gratis: 'GRATUITO', video: 'VÍDEO' };
          
          // Group by type
          const provaCards = sources.filter(s => s.type === 'prova');
          const dirCards = sources.filter(s => s.type === 'dir');
          const refCards = sources.filter(s => s.type === 'ref');

          function renderFonteCards(cards, matchedTemasForTopic) {
            return cards.map(card => {
              const badges = card.tipos.map(t => `<span class="fonte-badge fonte-badge-${t}">${BADGE_LABELS[t] || t.toUpperCase()}</span>`).join(' ');
              const temas = card.temas.map(t => {
                const isMatched = card.matchedTemas.includes(t);
                return `<span class="fonte-tema-pill${isMatched ? ' matched' : ''}">${t}</span>`;
              }).join('');
              const link = card.link ? `<a class="fonte-card-link" href="${card.link}" target="_blank" onclick="event.stopPropagation()">↗ ${new URL(card.link).hostname.replace('www.','')}</a>` : '';
              return `<div class="modal-fonte-card fonte-${card.type}">
                <div class="fonte-card-header">
                  <div class="fonte-card-name">${card.name}</div>
                  <div class="fonte-card-badges">${badges}</div>
                </div>
                <div class="fonte-card-desc">${card.desc}</div>
                <div class="fonte-card-temas">${temas}</div>
                ${link}
              </div>`;
            }).join('');
          }

          let fonteSections = '';
          if (provaCards.length > 0) {
            fonteSections += `<div class="fonte-priority-label"><span class="fonte-priority-dot" style="background:var(--accent-purple)"></span>Material de Prova — base principal</div>`;
            fonteSections += renderFonteCards(provaCards);
          }
          if (dirCards.length > 0) {
            fonteSections += `<div class="fonte-priority-label" style="margin-top:12px"><span class="fonte-priority-dot" style="background:var(--accent-green)"></span>Diretrizes — conduta atualizada</div>`;
            fonteSections += renderFonteCards(dirCards);

          updateSyncBadge('online', user.email);
          
          // Setup Realtime Listener with Smart Merge
          db.collection('users').doc(user.uid).onSnapshot((doc) => {
            if (doc.exists) {
              const serverData = doc.data().plannerData;
              if (serverData) {
                const serverObj = JSON.parse(serverData);
                let merged = { ...globalData };
                let hasChanges = false;
                
                // Smart merging loop
                for (const [idx, item] of Object.entries(serverObj)) {
                  const localItem = globalData[idx] || {};
                  const mergedItem = { ...localItem };
                  
                  if (item.status === 'done' && localItem.status !== 'done') {
                    mergedItem.status = 'done';
                    hasChanges = true;
                  }
                  if ((item.notes || '').trim().length > (localItem.notes || '').trim().length) {
                    mergedItem.notes = item.notes;
                    hasChanges = true;
                  }
                  if ((item.doubts || '').trim().length > (localItem.doubts || '').trim().length) {
                    mergedItem.doubts = item.doubts;
                    hasChanges = true;
                  }
                  merged[idx] = { ...item, ...mergedItem };
                }
                
                // Add local keys not present on server
                for (const [idx, item] of Object.entries(globalData)) {
                  if (!serverObj[idx]) {
                    merged[idx] = item;
                    hasChanges = true;
                  }
                }

                globalData = merged;
                const globalStr = JSON.stringify(globalData);
                localStorage.setItem(STORAGE_KEY, globalStr);
                
                if (hasChanges) {
                  db.collection('users').doc(user.uid).set({
                    plannerData: globalStr,
                    lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                  }, { merge: true }).catch(err => console.error("Error updating merged data on server", err));

      let message = `Erro ao ${context}: ${err.message}`;
      
      if (err.code === 'auth/configuration-not-found') {
        message = `<strong>⚠️ Configuração pendente no Firebase Console</strong><br>

      } else if (err.code === 'auth/invalid-email') {
        message = `O e-mail inserido é inválido.`;
      } else if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password') {

      errBox.innerHTML = message;

          </div>
          <div class="config-group" style="margin-top: 10px;">
            <label>Configuração Firebase (JSON)</label>
            <textarea id="firebaseConfigTextarea" placeholder='{\n  "apiKey": "...",\n  "authDomain": "...",\n  "projectId": "..."\n}' class="modal-textarea" style="height: 120px; font-family: monospace; font-size: 11px; padding:8px; background:rgba(0,0,0,0.2); color:white; border:1px solid var(--border-primary); border-radius:var(--radius-sm); width:100%; box-sizing:border-box;">${configStr ? JSON.stringify(JSON.parse(configStr), null, 2) : ''}</textarea>
          </div>
          <div style="display: flex; gap: 8px; margin-top: 12px;">
            <button class="btn-save" style="margin: 0; padding: 8px 12px; font-size:11px;" onclick="saveCustomFirebaseConfig()">Salvar Configuração</button>
            <button class="btn-cancel" style="margin: 0; padding: 8px 12px; font-size:11px;" onclick="resetFirebaseConfig()">Restaurar Padrão</button>
          </div>
        </div>
      `;

      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function toggleModalAuthMode() {
      isModalSignupMode = !isModalSignupMode;
      const title = document.getElementById('modalAuthTitle');
      const confirmInput = document.getElementById('modalConfirmPasswordInput');
      const primaryBtn = document.getElementById('modalAuthPrimaryBtn');
      const toggleText = document.getElementById('modalAuthToggleText');
      const toggleLink = document.getElementById('modalAuthToggleLink');
      const errBox = document.getElementById('modalAuthError');
      
      if (errBox) errBox.style.display = 'none';

      if (isModalSignupMode) {
        title.textContent = "Criar Conta";
        confirmInput.style.display = 'block';
        primaryBtn.textContent = "Cadastrar";
        toggleText.textContent = "Já tem conta?";
        toggleLink.textContent = "Entrar";
      } else {
        title.textContent = "Login";
        confirmInput.style.display = 'none';
        primaryBtn.textContent = "Entrar";
        toggleText.textContent = "Não tem conta?";
        toggleLink.textContent = "Criar conta";
      }
    }

    function submitModalAuth() {
      const e = document.getElementById('modalEmailInput').value.trim();
      const p = document.getElementById('modalPasswordInput').value.trim();
      const errBox = document.getElementById('modalAuthError');
      if (!e || !p) {
        errBox.style.display = 'block';
        errBox.textContent = "Por favor, preencha todos os campos.";
        return;
      }

      if (isModalSignupMode) {
        const cp = document.getElementById('modalConfirmPasswordInput').value.trim();
        if (p !== cp) {
          errBox.style.display = 'block';
          errBox.textContent = "As senhas não coincidem.";
          return;
        }
        handleModalSignup();
      } else {
        handleModalLogin();
      }
    }

    function handleModalLogin() {
      const e = document.getElementById('modalEmailInput').value.trim();
      const p = document.getElementById('modalPasswordInput').value.trim();
      const errBox = document.getElementById('modalAuthError');
      
      if (!firebaseInitialized) {
        errBox.style.display = 'block';
        errBox.textContent = "Erro: Firebase não inicializado.";
        return;
      }

      auth.signInWithEmailAndPassword(e, p).then(() => {
        closeModal();
      }).catch(err => {
        handleFirebaseError(err, 'entrar', 'modalAuthError');
      });
    }

    function handleModalSignup() {
      const e = document.getElementById('modalEmailInput').value.trim();
      const p = document.getElementById('modalPasswordInput').value.trim();
      const errBox = document.getElementById('modalAuthError');
      
      if (!firebaseInitialized) {
        errBox.style.display = 'block';
        errBox.textContent = "Erro: Firebase não inicializado.";
        return;
      }

      auth.createUserWithEmailAndPassword(e, p).then((cred) => {
        if(Object.keys(globalData).length > 0) {
          db.collection('users').doc(cred.user.uid).set({
            plannerData: JSON.stringify(globalData),
            lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
          }).catch(err => console.error("Error setting custom initial planner data:", err));
        }
        closeModal();
      }).catch(err => {
        handleFirebaseError(err, 'criar conta', 'modalAuthError');
      });
    }

    function saveCustomFirebaseConfig() {
      const txt = document.getElementById('firebaseConfigTextarea').value.trim();
      if (!txt) {
        resetFirebaseConfig();
        return;
      }

      try {
        const parsed = JSON.parse(txt);
        if (!parsed.apiKey || !parsed.projectId) {
          alert("Configuração Firebase inválida. Certifique-se de que possui apiKey e projectId.");
          return;
        }
        localStorage.setItem('custom_firebase_config_2026', JSON.stringify(parsed));
        localStorage.setItem('bypass_auth_2026', 'false');
        alert("Configurações salvas! Recarregando a página para aplicar...");
        location.reload();
      } catch (err) {
        alert("Erro ao decodificar JSON: " + err.message);
      }
    }

    function resetFirebaseConfig() {
      localStorage.removeItem('custom_firebase_config_2026');
      localStorage.setItem('bypass_auth_2026', 'false');
      alert("Configurações restauradas para o padrão! Recarregando a página...");
      location.reload();
    }

  </script>
</body>

</html>
